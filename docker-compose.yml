version: "3.9"

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: yoladgu
      POSTGRES_PASSWORD: password
      POSTGRES_DB: yoladgu
    ports: ["55433:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7
    ports: ["16380:6379"]

  # Qdrant vektör veritabanı
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333","6334:6334"]
    volumes: [qdrant_storage:/qdrant/storage]

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on: [postgres, redis, qdrant]
    ports: ["8001:8000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      # Ensure correct in-network URLs and Qdrant backend
      DATABASE_URL: postgresql+asyncpg://yoladgu:password@postgres:5432/yoladgu
      REDIS_URL: redis://redis:6379/0
      VECTOR_BACKEND: qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_BLUE: questions_blue
      QDRANT_COLLECTION_GREEN: questions_green
      QDRANT_ALIAS_ACTIVE: questions_active
      EMBED_DIM: "384"

  frontend:
    build: ./frontend
    depends_on: [backend]
    ports: ["8080:8080"]

volumes:
  pgdata:
  qdrant_storage:
