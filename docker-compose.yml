version: "3.9"

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: yoladgu
      POSTGRES_PASSWORD: password
      POSTGRES_DB: yoladgu
    ports: ["55433:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7
    ports: ["16380:6379"]

  # İstersen aç: Qdrant (VECTOR_BACKEND=qdrant yapman gerekir)
  # qdrant:
  #   image: qdrant/qdrant:latest
  #   ports: ["6333:6333","6334:6334"]
  #   volumes: [qdrant_storage:/qdrant/storage]

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on: [postgres, redis]
    ports: ["8001:8000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    depends_on: [backend]
    ports: ["8080:8080"]

volumes:
  pgdata:
  qdrant_storage:
