<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnAI - Soru Çöz</title>
  <style>
    body{font-family:system-ui;background:#0b1220;color:#e5e7eb;margin:0;padding:20px}
    .wrap{max-width:900px;margin:0 auto}
    .card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:20px;margin:16px 0}
    button{padding:10px 16px;border-radius:10px;border:1px solid #374151;background:#1f2937;color:#93c5fd;cursor:pointer}
    .option{padding:12px;border:1px solid #374151;border-radius:10px;margin:8px 0;cursor:pointer}
    .option.sel{border-color:#60a5fa;background:#0a1220}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Matematik - Quiz</h2>
      <p>AI önerisiyle getirilen soruları cevapla.</p>
      <button id="btnStart" onclick="startQuiz()">Başla</button>
    </div>

    <div class="card" id="question" style="display:none">
      <div id="qtext"></div>
      <div id="opts"></div>
      <br/>
      <button onclick="submitAnswer()">Cevabı Gönder</button>
      <button onclick="nextQuestion()">Sonraki</button>
      <button onclick="finishQuiz()">Bitir</button>
    </div>
  </div>

  <script>
    if(!API.ensureAuthed()) return;
    let chosen = null, current = null;
    function renderQuestion(q){
      document.getElementById('question').style.display='';
      document.getElementById('qtext').innerText = q.text;
      const opts = q.options || [];
      document.getElementById('opts').innerHTML = opts.map((t,i)=>`<div class="option" data-idx="${i}" onclick="sel(this)">${String.fromCharCode(65+i)}) ${t}</div>`).join("");
    }
    function sel(el){ document.querySelectorAll('.option').forEach(x=>x.classList.remove('sel')); el.classList.add('sel'); chosen = parseInt(el.getAttribute('data-idx')); }
    async function startQuiz(){
      const r = await fetch(`${API.base}/quiz/start`, {method:'POST', headers:{'Content-Type':'application/json', ...API.authHeaders()}, body: JSON.stringify({})});
      const data = await r.json();
      current = { session_id: data.session_id, question_id: data.question.id };
      renderQuestion(data.question);
      document.getElementById('btnStart').style.display='none';
    }
    async function submitAnswer(){
      if(chosen===null){ API.uiToast('Bir seçenek seçin','error'); return; }
      await fetch(`${API.base}/quiz/answer`, {method:'POST', headers:{'Content-Type':'application/json', ...API.authHeaders()}, body: JSON.stringify({session_id: current.session_id, question_id: current.question_id, selected_option: chosen, time_ms: 0, hint_used: false})});
      API.uiToast('Cevap gönderildi','success');
    }
    async function nextQuestion(){
      const r = await fetch(`${API.base}/quiz/next`, {method:'POST', headers:{'Content-Type':'application/json', ...API.authHeaders()}, body: JSON.stringify({session_id: current.session_id})});
      const data = await r.json();
      current.question_id = data.question.id;
      chosen = null; renderQuestion(data.question);
    }
    async function finishQuiz(){
      const r = await fetch(`${API.base}/quiz/finish`, {method:'POST', headers:{'Content-Type':'application/json', ...API.authHeaders()}, body: JSON.stringify({session_id: current.session_id})});
      const sum = await r.json();
      API.uiToast(`Doğru: ${sum.correct}/${sum.total} (acc=${(sum.accuracy*100).toFixed(0)}%)`,'info');
    }
  </script>
</body>
</html>
