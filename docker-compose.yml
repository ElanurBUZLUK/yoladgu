version: '3.8'
services:
  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - neo4j
    environment:
      - POSTGRES_SERVER=postgres
      - REDIS_HOST=redis
      - NEO4J_URI=bolt://neo4j:7687
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./data:/app/data

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: yoladgu
      POSTGRES_USER: yoladgu_user
      POSTGRES_PASSWORD: yoladgu123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:latest
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      - NEO4J_AUTH=neo4j/neo4j
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data: 