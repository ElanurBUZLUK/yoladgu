version: "3.8"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: learnai
      POSTGRES_USER: learnai
      POSTGRES_PASSWORD: learnai
    ports: ["55432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["16379:6379"]
  backend:
    build: ../backend
    environment:
      DATABASE_URL: postgresql+asyncpg://learnai:learnai@postgres:5432/learnai
      REDIS_URL: redis://redis:6379/0
      VECTOR_BACKEND: qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_BLUE: questions_blue
      QDRANT_COLLECTION_GREEN: questions_green
      QDRANT_ALIAS_ACTIVE: questions_active
      EMBED_DIM: "384"
    depends_on:
      - postgres
      - redis
      - qdrant
    ports:
      - "8001:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload


  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333","6334:6334"]
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  pg_data:
  qdrant_storage:
