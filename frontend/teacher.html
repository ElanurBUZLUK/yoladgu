<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Öğretmen Paneli</title>
  <style>
    body{font-family:system-ui;background:#0f172a;color:#e2e8f0;margin:0;padding:20px}
    .wrap{max-width:1100px;margin:0 auto}
    .card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:20px;margin:16px 0}
    input,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #374151;background:#0b1220;color:#e5e7eb}
    button{padding:10px 16px;border-radius:10px;border:1px solid #374151;background:#1f2937;color:#93c5fd;cursor:pointer}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid #1f2937;padding:8px;text-align:left}
  </style>
</head>
<body>
  <div class="wrap">
    <h2>👩‍🏫 Öğretmen Paneli</h2>

    <div class="card">
      <h3>Bekleyen İstekler</h3>
      <table><thead><tr><th>ID</th><th>Öğrenci</th><th>Durum</th><th>İşlem</th></tr></thead><tbody id="reqs"></tbody></table>
    </div>

    <div class="card">
      <h3>Ödev Oluştur</h3>
      <input id="title" placeholder="Başlık" />
      <textarea id="desc" placeholder="Açıklama"></textarea>
      <button onclick="createAssignment()">Kaydet</button>
    </div>

    <div class="card">
      <h3>Ödevlerim</h3>
      <ul id="assignments"></ul>
    </div>
  </div>

  <script src="./assets/js/api.js"></script>
  <script>
    if(!API.ensureAuthed()) return;
    async function load(){
      const req = await API.teacherLinksPending();
      document.getElementById('reqs').innerHTML = req.map(r=>`<tr><td>${r.id}</td><td>${r.student_id}</td><td>${r.status}</td><td><button onclick=\"approve(${r.id})\">Onay</button> <button onclick=\"reject(${r.id})\">Reddet</button></td></tr>`).join("");
      const as = await API.listAssignmentsTeacher();
      document.getElementById('assignments').innerHTML = as.map(a=>`<li>#${a.id} ${a.title}</li>`).join("");
    }
    async function approve(id){ await API.teacherLinkApprove(id); API.uiToast('Onaylandı','success'); load(); }
    async function reject(id){ await API.teacherLinkReject(id); API.uiToast('Reddedildi','error'); load(); }
    async function createAssignment(){
      const title = document.getElementById('title').value;
      const description = document.getElementById('desc').value;
      await API.createAssignment({title, description});
      API.uiToast('Ödev oluşturuldu','success'); load();
    }
    load();
  </script>
</body>
</html>
